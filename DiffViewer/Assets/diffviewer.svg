<?xml version="1.0" encoding="UTF-8"?>
<!--
  DiffViewer app icon — design source (variant D2, "chunky hunk blocks").
  256x256 viewBox; the .ico is rasterised from this design at multiple
  sizes by Assets\generate-icon.ps1 (which encodes the same primitives
  using WPF DrawingContext rather than parsing this SVG, so keep the two
  in sync if you tweak the design).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Page silhouette: white fill, charcoal outline -->
  <rect x="40" y="20" width="176" height="216" rx="20" fill="#FFFFFF" stroke="#24292F" stroke-width="8"/>

  <!-- Top context line (unchanged code above the hunk) -->
  <rect x="64" y="48" width="100" height="14" rx="3" fill="#D0D7DE"/>

  <!-- Removed hunk: thick red block with two faint white inter-line dividers -->
  <rect x="64" y="74" width="128" height="48" rx="6" fill="#FFC1C0"/>
  <line x1="64" y1="90"  x2="192" y2="90"  stroke="#FFFFFF" stroke-width="3" opacity="0.55"/>
  <line x1="64" y1="106" x2="192" y2="106" stroke="#FFFFFF" stroke-width="3" opacity="0.55"/>

  <!-- Added hunk: thick green block with two faint white inter-line dividers -->
  <rect x="64" y="134" width="128" height="48" rx="6" fill="#ACEEBB"/>
  <line x1="64" y1="150" x2="192" y2="150" stroke="#FFFFFF" stroke-width="3" opacity="0.55"/>
  <line x1="64" y1="166" x2="192" y2="166" stroke="#FFFFFF" stroke-width="3" opacity="0.55"/>

  <!-- Bottom context line (unchanged code below the hunk) -->
  <rect x="64" y="194" width="86" height="14" rx="3" fill="#D0D7DE"/>
</svg>
